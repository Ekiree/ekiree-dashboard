name: Test Django

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:latest
        ports:
          - 3306
        env:
          MYSQL_USER: poetfolio
          MYSQL_PASSWORD: devdevdev
          MYSQL_DATABASE: poetfolio_dev
          MYSQL_HOST: 127.0.0.1
          
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27
    
    - name: Install Flake
      run: |
        nix build
        
    - name: Check Flake
      run: |
        nix flake check
        
    - name: Run Tests
      run: |
        ls
        ./result/bin/python ./ekiree_dashboard/manage.py test
