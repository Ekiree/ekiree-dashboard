name: Test Django

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      mariadb:
        image: mariadb:latest
        ports:
          - '3306:3306'
        env:
          MARIADB_USER: poetfolio
          MARIADB_PASSWORD: devdevdev
          MARIADB_DATABASE: poetfolio_dev
          MARIADB_ROOT_PASSWORD: devdevdev
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3
          
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27

    - name: Verify MariaDB connection
      env:
        PORT: ${{ job.services.mariadb.ports[3306] }}
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"$PORT" --silent; do
          sleep 1
        done   
    
    - name: Install Flake
      env:
        PORT: ${{ job.services.mariadb.ports[3306] }}
      run: nix build
        
    - name: Check Flake
      run: nix flake check

    - name: Run Migrations
      env:
        POETFOLIO_DB_HOST: 127.0.0.1
      run: |
        ./result/bin/python ./ekiree_dashboard/manage.py --run-syncdb

    - name: Run Tests
      env:
        POETFOLIO_DB_HOST: 127.0.0.1
      run: ./result/bin/python ./ekiree_dashboard/manage.py test
