name: Test Django

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:latest
        ports:
          - 3306
        env:
          MYSQL_USER: poetfolio
          MYSQ_PASSWORD: devdevdev     
          MYSQL_ROOT_PASSWORD: devdevdev
          MYSQL_DATABASE: poetfolio_dev
          
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3
          
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27

    - name: Verify MariaDB connection
      env:
        PORT: ${{ job.services.mariadb.ports[3306] }}
      run: |
        while ! mysqladmin ping -h"127.0.0.1" -P"$PORT" --silent; do
          sleep 1
        done   
    
    - name: Install Flake
      run: |
        nix build
        
    - name: Check Flake
      run: |
        nix flake check

    - name: Run Migrations
      run: python manage.py migrate
        
    - name: Run Tests
      run: |
        ls
        ./result/bin/python ./ekiree_dashboard/manage.py test
