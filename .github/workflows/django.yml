name: Test Django

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v27
    
    - name: Install Flake
      run: |
        nix build
        
    - name: Check Flake
      run: |
        nix flake check
        
    - name: Run Tests
      run: |
        ls
        ./result/bin/python ./ekiree_dashboard/manage.py test
